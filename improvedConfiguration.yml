analysis_metrics:
  default:
    - id: new_lines
      source: Sonar

    - id: new_coverage
      source: Sonar

    - id: files
      source: Sonar

  radar:
    - id: cyclomatic_complexity
      checked: true
      source: CodeQL
      thresholds:
        a:
          lower_bound: 0
          upper_bound: 10
        b:
          lower_bound: 10
          upper_bound: 20
        c:
          lower_bound: 20
          upper_bound: 40
        d:
          lower_bound: 40
          upper_bound: 60
        e:
          lower_bound: 60
          upper_bound: 80  # Upper limit is +15

    - id: cognitive_complexity
      checked: true
      source: Sonar
      thresholds:
        a:
          lower_bound: 0
          upper_bound: 3
        b:
          lower_bound: 3
          upper_bound: 6
        c:
          lower_bound: 6
          upper_bound: 9
        d:
          lower_bound: 9
          upper_bound: 12
        e:
          lower_bound: 12
          upper_bound: 15  # Upper limit is +15

    - id: instability
      checked: true
      source: CodeQL
      thresholds:
        a:
          lower_bound: 0
          upper_bound: 0.2
        b:
          lower_bound: 0.2
          upper_bound: 0.4
        c:
          lower_bound: 0.4
          upper_bound: 0.6
        d:
          lower_bound: 0.6
          upper_bound: 0.8
        e:
          lower_bound: 0.8
          upper_bound: 1  # Upper limit is 100%

    - id: lack_of_cohesion
      checked: true
      source: CodeQL
      thresholds:
        a:
          lower_bound: 0
          upper_bound: 3
        b:
          lower_bound: 3
          upper_bound: 7
        c:
          lower_bound: 7
          upper_bound: 10
        d:
          lower_bound: 10
          upper_bound: 15
        e:
          lower_bound: 15
          upper_bound: 20 # Upper limit is +5